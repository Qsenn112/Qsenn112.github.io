<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List - TPGNS</title>
  </head>

  <body>
    <main class="container">
      <div class="back-link">
        <a href="/">← 포트폴리오로 돌아가기</a>
        <a href="todo-list.apk" download class="apk-download">Android APK 다운로드</a>
      </div>
      <h1>할 일 목록</h1>

      <form class="todo-form" id="todo-form">
        <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." required />
        <select id="category-select">
          <option value="일반">일반</option>
          <option value="업무">업무</option>
          <option value="개인">개인</option>
          <option value="쇼핑">쇼핑</option>
          <option value="학습">학습</option>
        </select>
        <select id="priority-select">
          <option value="낮음">낮음</option>
          <option value="보통" selected>보통</option>
          <option value="높음">높음</option>
        </select>
        <button type="submit">추가</button>
      </form>

      <div class="filter-bar">
        <select id="filter-category">
          <option value="전체">전체 카테고리</option>
          <option value="일반">일반</option>
          <option value="업무">업무</option>
          <option value="개인">개인</option>
          <option value="쇼핑">쇼핑</option>
          <option value="학습">학습</option>
        </select>
        <select id="filter-priority">
          <option value="전체">전체 우선순위</option>
          <option value="높음">높음</option>
          <option value="보통">보통</option>
          <option value="낮음">낮음</option>
        </select>
        <select id="filter-status">
          <option value="전체">전체 상태</option>
          <option value="진행중">진행중</option>
          <option value="완료">완료</option>
        </select>
      </div>

      <div class="stats">
        <span id="stat-total">전체: 0</span>
        <span id="stat-done">완료: 0</span>
        <span id="stat-pending">진행중: 0</span>
      </div>

      <ul id="todo-list" class="todo-list"></ul>

      <div class="empty-state" id="empty-state">
        <p>할 일이 없습니다. 위에서 추가해보세요!</p>
      </div>
    </main>

    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <h2>할 일 수정</h2>
        <form id="edit-form">
          <input type="text" id="edit-input" required />
          <select id="edit-category">
            <option value="일반">일반</option>
            <option value="업무">업무</option>
            <option value="개인">개인</option>
            <option value="쇼핑">쇼핑</option>
            <option value="학습">학습</option>
          </select>
          <select id="edit-priority">
            <option value="낮음">낮음</option>
            <option value="보통">보통</option>
            <option value="높음">높음</option>
          </select>
          <div class="modal-buttons">
            <button type="submit">저장</button>
            <button type="button" id="edit-cancel">취소</button>
          </div>
        </form>
      </div>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
