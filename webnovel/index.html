<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>붉은달의 밤 — 인터랙티브 웹소설</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --bg3: #1a1a2e;
      --text: #e0dcd0;
      --text-dim: #888;
      --text-bright: #fff;
      --red: #c0392b;
      --red-glow: #e74c3c;
      --gold: #d4a047;
      --blue: #4a7fc1;
      --green: #27ae60;
      --border: #2a2a3e;
      --card: #161625;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      touch-action: manipulation;
    }
    .moon-bg {
      position: fixed;
      top: -100px; right: -100px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, rgba(180,40,40,0.12), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      max-width: 800px; margin: 0 auto; padding: 20px;
      position: relative; z-index: 1;
    }

    header {
      text-align: center; padding: 30px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    header h1 { font-size: 1.5rem; color: var(--red); letter-spacing: 0.1em; font-weight: 700; }
    header .sub { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }

    /* Stats bar */
    #stats-bar {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      gap: 16px;
      flex-wrap: wrap;
    }
    #stats-bar.active { display: flex; }
    .stat-group { flex: 1; min-width: 120px; }
    .stat-label { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 2px; }
    .stat-bar-outer {
      height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden;
    }
    .stat-bar-inner {
      height: 100%; border-radius: 3px; transition: width 0.5s ease;
    }
    .stat-bar-inner.hp { background: var(--green); }
    .stat-bar-inner.mp { background: var(--blue); }
    .stat-bar-inner.rp { background: var(--gold); }

    /* Title screen */
    #title-screen {
      text-align: center; padding: 80px 20px 40px;
    }
    #title-screen .moon-icon { font-size: 4rem; display: block; margin-bottom: 20px; }
    #title-screen h1 { font-size: 2.2rem; color: var(--red); margin-bottom: 10px; letter-spacing: 0.15em; }
    #title-screen .tagline { color: var(--text-dim); margin-bottom: 8px; font-size: 0.95rem; }
    #title-screen .info { color: var(--text-dim); font-size: 0.8rem; margin-bottom: 30px; }
    #start-btn {
      background: var(--red); color: white; border: none;
      padding: 14px 48px; border-radius: 8px; font-size: 1.1rem;
      font-family: inherit; cursor: pointer; transition: all 0.3s;
      font-weight: 500;
    }
    #start-btn:hover { background: var(--red-glow); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(192,57,43,0.3); }
    #start-btn:active { transform: translateY(0); }

    /* APK download hidden on desktop */
    .apk-link-wrapper.desktop-only { display: none !important; }
    .apk-link-wrapper.mobile-only { display: block; }
    body:not(.mobile-device) .apk-link-wrapper { display: none !important; }

    /* Story area */
    #story-screen { display: none; }
    #story-screen.active { display: block; }

    #chapter-title {
      font-size: 1.1rem; color: var(--gold); margin-bottom: 16px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
      font-weight: 500;
    }

    #story-text {
      line-height: 1.9; font-size: 0.95rem;
      margin-bottom: 24px; min-height: 200px;
    }
    #story-text p { margin-bottom: 1em; }
    #story-text .highlight { color: var(--red-glow); font-weight: 500; }
    #story-text .italic { font-style: italic; color: var(--gold); }

    /* Choices */
    #choices { display: none; margin-bottom: 24px; }
    #choices.active { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn {
      background: var(--bg2); color: var(--text); border: 1px solid var(--border);
      padding: 14px 18px; border-radius: 8px; font-size: 0.9rem;
      text-align: left; cursor: pointer; font-family: inherit;
      transition: all 0.2s; line-height: 1.5;
    }
    .choice-btn:hover {
      border-color: var(--red); background: var(--bg3);
      transform: translateX(4px);
    }
    .choice-btn:active {
      border-color: var(--red-glow);
    }
    .choice-btn .choice-label {
      color: var(--red); font-weight: 500; font-size: 0.75rem;
      display: block; margin-bottom: 2px;
    }

    /* Navigation */
    #nav-area {
      display: none; margin-top: 30px; padding-top: 20px;
      border-top: 1px solid var(--border);
      justify-content: space-between; align-items: center;
    }
    #nav-area.active { display: flex; }
    .nav-btn {
      background: var(--bg2); color: var(--text); border: 1px solid var(--border);
      padding: 10px 24px; border-radius: 6px; font-size: 0.85rem;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .nav-btn:hover { border-color: var(--gold); color: var(--gold); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; border-color: var(--border); color: var(--text-dim); }

    #progress-text { font-size: 0.8rem; color: var(--text-dim); }

    /* Continue / reset */
    #continue-bar {
      display: none; margin-bottom: 20px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px;
      align-items: center; justify-content: space-between;
    }
    #continue-bar.active { display: flex; }
    #continue-bar .info { font-size: 0.85rem; color: var(--text-dim); }
    #continue-btn {
      background: var(--gold); color: #000; border: none;
      padding: 8px 20px; border-radius: 6px; font-size: 0.85rem;
      cursor: pointer; font-family: inherit; font-weight: 500;
      transition: all 0.2s;
    }
    #continue-btn:hover { background: #e2b85c; }
    #reset-btn {
      background: transparent; color: var(--text-dim); border: 1px solid var(--border);
      padding: 8px 16px; border-radius: 6px; font-size: 0.8rem;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    #reset-btn:hover { border-color: var(--red); color: var(--red); }

    #inventory-area {
      display: none;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
      font-size: 0.8rem;
    }
    #inventory-area.active { display: block; }
    #inventory-area .inv-title { color: var(--gold); font-weight: 500; margin-bottom: 4px; }
    #inventory-area .inv-item { color: var(--text-dim); }

    #skip-hint {
      display: none; text-align: center; margin-top: 8px;
      font-size: 0.75rem; color: var(--text-dim); opacity: 0.6;
    }
    #skip-hint.active { display: block; }

    /* Help overlay */
    #help-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 1000;
      justify-content: center; align-items: center;
    }
    #help-overlay.active { display: flex; }
    .help-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 36px 32px; max-width: 420px; width: 90%; text-align: center;
    }
    .help-box h2 { color: var(--gold); font-size: 1.2rem; margin-bottom: 20px; font-weight: 500; }
    .help-row {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .help-row:last-child { border-bottom: none; }
    .help-key {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 14px; font-size: 0.85rem; color: var(--gold);
      white-space: nowrap; min-width: 70px; text-align: center; font-weight: 500;
    }
    .help-desc { font-size: 0.85rem; color: var(--text); line-height: 1.5; }
    .help-close-btn {
      margin-top: 24px; background: var(--red); color: white; border: none;
      padding: 10px 32px; border-radius: 8px; font-size: 0.9rem;
      cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.2s;
    }
    .help-close-btn:hover { background: var(--red-glow); }
    #help-btn {
      position: fixed; bottom: 20px; right: 20px; z-index: 100;
      background: var(--card); border: 1px solid var(--border); color: var(--text-dim);
      width: 40px; height: 40px; border-radius: 50%; font-size: 1.1rem;
      cursor: pointer; font-family: inherit; transition: all 0.2s; line-height: 1;
    }
    #help-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* Show/hide helpers */
    .desktop-only { display: block; }
    .mobile-only { display: none; }
    .mobile-device .desktop-only { display: none !important; }
    .mobile-device .mobile-only { display: block !important; }
    .mobile-device .help-row.desktop-only { display: none !important; }
    .mobile-device .help-row.mobile-only { display: flex !important; }

    @media (max-width: 600px) {
      .container { padding: 12px; }
      #title-screen { padding: 40px 12px 20px; }
      #title-screen h1 { font-size: 1.5rem; }
      .stat-group { min-width: 80px; }
      #story-text { font-size: 0.9rem; line-height: 1.8; }
      #continue-bar { flex-direction: column; gap: 10px; }
    }
  </style>
</head>
<body>
<div class="moon-bg"></div>
<div class="container">

  <header>
    <h1>붉은달의 밤</h1>
    <div class="sub">인터랙티브 웹소설 · 제1장 ~ 제9장</div>
  </header>

  <div id="continue-bar">
    <div class="info">이전에 읽던 내용이 있습니다.</div>
    <div style="display:flex;gap:8px">
      <button id="continue-btn">이어서 읽기</button>
      <button id="reset-btn">처음부터</button>
    </div>
  </div>

  <div id="stats-bar">
    <div class="stat-group">
      <div class="stat-label">체력</div>
      <div class="stat-bar-outer"><div class="stat-bar-inner hp" id="hp-bar" style="width:80%"></div></div>
    </div>
    <div class="stat-group">
      <div class="stat-label">정신력</div>
      <div class="stat-bar-outer"><div class="stat-bar-inner mp" id="mp-bar" style="width:80%"></div></div>
    </div>
    <div class="stat-group">
      <div class="stat-label">유대</div>
      <div class="stat-bar-outer"><div class="stat-bar-inner rp" id="rp-bar" style="width:50%"></div></div>
    </div>
  </div>

  <div id="inventory-area">
    <div class="inv-title">▼ 소지품</div>
    <div class="inv-item" id="inventory-text">-</div>
  </div>

  <div id="title-screen">
    <span class="moon-icon">🌙</span>
    <h1>붉은달의 밤</h1>
    <p class="tagline">"당신은 꿈을 위해 무엇까지 희생할 수 있는가?"</p>
    <p class="info">총 9장 · 선택지 분기형 스토리</p>
    <div style="margin-bottom:24px">
      <input id="name-input" type="text" placeholder="이름을 입력하세요" maxlength="10"
        style="background:var(--bg2);color:var(--text);border:1px solid var(--border);
        padding:12px 18px;border-radius:8px;font-size:1rem;font-family:inherit;
        text-align:center;width:240px;outline:none;transition:border-color 0.2s"
        onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='var(--border)'" />
    </div>
    <button id="start-btn">시작하기</button>
    <div class="apk-link-wrapper" style="margin-top:12px">
      <a href="red-moon-night.apk" download style="color:var(--text-dim);font-size:0.8rem;text-decoration:none;border:1px solid var(--border);padding:6px 18px;border-radius:6px;transition:all 0.2s;display:inline-block" onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-dim)'">Android APK 다운로드</a>
    </div>
    <button id="help-btn-title" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:8px 24px;border-radius:6px;font-size:0.8rem;cursor:pointer;font-family:inherit;margin-top:12px;transition:all 0.2s">도움말</button>
  </div>

  <button id="help-btn">?</button>

  <div id="help-overlay">
    <div class="help-box" id="help-box-content">
      <!-- 동적으로 채워집니다 -->
    </div>
  </div>

  <div id="story-screen">
    <div id="chapter-title"></div>
    <div id="story-text"></div>
    <div id="choices"></div>
    <div id="nav-area">
      <span id="progress-text"></span>
      <button class="nav-btn" id="next-btn">다음 장 →</button>
    </div>
    <div id="skip-hint"></div>
  </div>

</div>

<script src="data.js?v=3"></script>
<script>
(function() {
  // 모바일/터치 디바이스 감지
  const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  const isTauriApp = !!(window.__TAURI_INTERNALS__ || window.__TAURI__);
  if (isMobile) {
    document.body.classList.add('mobile-device');
  }
  if (isTauriApp) {
    const w = document.querySelector('.apk-link-wrapper');
    if (w) w.style.display = 'none';
  }

  var STORY_DATA = window.STORY_DATA;
  if (!STORY_DATA || !STORY_DATA.length) {
    document.getElementById('start-btn').textContent = '데이터 로드 실패';
    document.getElementById('start-btn').disabled = true;
    console.error('data.js failed to load');
    return;
  }

  let state = loadState() || {
    currentChapter: 0,
    currentScene: 0,
    hp: 100, mp: 100, bond: 50,
    inventory: ['목걸이 (어머니의 유품)'],
    flags: {},
    choiceHistory: [],
    started: false
  };

  let isAnimating = false;
  let playerName = state.playerName || '소라인';

  function hasBatchim(name) {
    const code = name.charCodeAt(name.length - 1) - 0xAC00;
    if (code < 0 || code > 11171) return false;
    return (code % 28) !== 0;
  }

  const BATCHIM_MAP = {
    '은': '는', '이': '가', '을': '를', '과': '와', '아': '야'
  };
  const NO_BATCHIM_MAP = {
    '는': '은', '가': '이', '를': '을', '와': '과', '야': '아'
  };

  function replaceName(text) {
    if (playerName === '소라인') return text;
    const hasB = hasBatchim(playerName);
    const shortName = playerName.length >= 3 ? playerName.slice(0, -1) : playerName;

    text = text.replace(/소라인이야/g, hasB ? playerName + '이야' : playerName + '야');

    text = text.replace(/(소라인)([은이을과아는가를와야])/g, function(match, name, josa) {
      if (hasB) {
        if (NO_BATCHIM_MAP[josa]) return playerName + NO_BATCHIM_MAP[josa];
        return playerName + josa;
      } else {
        if (BATCHIM_MAP[josa]) return playerName + BATCHIM_MAP[josa];
        return playerName + josa;
      }
    });

    text = text.replace(/소라인/g, playerName);

    if (shortName !== '소라') {
      text = text.replace(/소라(?!인)/g, shortName);
    }

    return text;
  }

  const $ = id => document.getElementById(id);

  function saveState() {
    try { localStorage.setItem('webnovel_state', JSON.stringify(state)); } catch(e) {}
  }

  function loadState() {
    try {
      const raw = localStorage.getItem('webnovel_state');
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  }

  function clearState() {
    try { localStorage.removeItem('webnovel_state'); } catch(e) {}
  }

  function updateStatsUI() {
    $('hp-bar').style.width = Math.max(0, Math.min(100, state.hp)) + '%';
    $('mp-bar').style.width = Math.max(0, Math.min(100, state.mp)) + '%';
    $('rp-bar').style.width = Math.max(0, Math.min(100, state.bond)) + '%';
    if (state.hp <= 30) $('hp-bar').style.background = '#c0392b';
    else if (state.hp <= 60) $('hp-bar').style.background = '#d4a047';
    else $('hp-bar').style.background = '#27ae60';
    if (state.mp <= 30) $('mp-bar').style.background = '#c0392b';
    else if (state.mp <= 60) $('mp-bar').style.background = '#d4a047';
    else $('mp-bar').style.background = '#4a7fc1';
  }

  function updateInventoryUI() {
    if (state.inventory.length > 0) {
      $('inventory-area').classList.add('active');
      $('inventory-text').textContent = state.inventory.join(' · ');
    } else {
      $('inventory-area').classList.remove('active');
    }
  }

  function getCurrentChapter() {
    return STORY_DATA[state.currentChapter];
  }

  function getCurrentScene() {
    const ch = getCurrentChapter();
    if (!ch) return null;
    return ch.scenes[state.currentScene] || null;
  }

  let skipTimer = null;

  function typeText(element, text, speed = 30, callback) {
    isAnimating = true;
    $('skip-hint').classList.add('active');
    element.innerHTML = '';
    let i = 0;
    if (skipTimer) { clearTimeout(skipTimer); skipTimer = null; }
    function addChar() {
      if (i >= text.length) {
        isAnimating = false;
        skipTimer = null;
        $('skip-hint').classList.remove('active');
        if (callback) callback();
        return;
      }
      const ch = text[i];
      if (ch === '\n') element.innerHTML += '<br>';
      else element.innerHTML += ch;
      i++;
      skipTimer = setTimeout(addChar, speed);
    }
    addChar();
  }

  function skipTypeText() {
    if (!isAnimating || !skipTimer) return;
    clearTimeout(skipTimer);
    skipTimer = null;
    isAnimating = false;
    $('skip-hint').classList.remove('active');
    const scene = getCurrentScene();
    if (!scene) return;
    const text = replaceName(scene.text);
    $('story-text').innerHTML = text.replace(/\n/g, '<br>');
    if (scene.choices && scene.choices.length > 0) showChoices(scene.choices);
    else showNextNav();
  }

  // 화면 전체 터치 = Space 역할 (모바일용)
  var touchLocked = false;
  var touchStartX = 0;
  var touchStartY = 0;
  var touchMoved = false;

  if (isMobile) {
    document.addEventListener('touchstart', function(e) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchMoved = false;
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
      if (touchMoved) return;
      var dx = Math.abs(e.touches[0].clientX - touchStartX);
      var dy = Math.abs(e.touches[0].clientY - touchStartY);
      if (dx > 10 || dy > 10) touchMoved = true;
    }, { passive: true });
  }

  function handleScreenTouch(e) {
    if (!isMobile || touchLocked || touchMoved) return;
    if (e.target.closest('.choice-btn') ||
        e.target.closest('.nav-btn') ||
        e.target.closest('#help-btn') ||
        e.target.closest('#help-btn-title') ||
        e.target.closest('.help-close-btn') ||
        e.target.closest('#start-btn') ||
        e.target.closest('#continue-btn') ||
        e.target.closest('#reset-btn') ||
        e.target.tagName === 'INPUT' ||
        e.target.tagName === 'A') {
      return;
    }

    if (isAnimating) {
      skipTypeText();
      touchLocked = true;
      setTimeout(function() { touchLocked = false; }, 400);
    } else {
      const nextBtn = $('next-btn');
      if (nextBtn && !nextBtn.disabled && $('nav-area').classList.contains('active')) {
        nextBtn.click();
        touchLocked = true;
        setTimeout(function() { touchLocked = false; }, 400);
      }
    }
  }

  if (isMobile) {
    $('story-screen').addEventListener('touchend', handleScreenTouch);
    document.addEventListener('touchend', function(e) {
      if (e.target.closest('.choice-btn')) return;
      if ($('help-overlay').classList.contains('active')) return;
      if ($('title-screen').style.display !== 'none') return;
      handleScreenTouch(e);
    });
  }

  let currentChoices = null;

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (isAnimating) {
        skipTypeText();
      } else {
        const nextBtn = $('next-btn');
        if (nextBtn && !nextBtn.disabled && $('nav-area').classList.contains('active')) {
          nextBtn.click();
        }
      }
    }
    if (!isAnimating && currentChoices && currentChoices.length > 0) {
      const num = parseInt(e.key);
      if (num >= 1 && num <= currentChoices.length) {
        e.preventDefault();
        const btns = $('choices').querySelectorAll('.choice-btn');
        if (btns[num - 1]) btns[num - 1].click();
      }
    }
  });

  function renderScene() {
    const scene = getCurrentScene();
    if (!scene) return;

    const ch = getCurrentChapter();
    $('chapter-title').textContent = ch.title;
    $('story-text').innerHTML = '';
    $('choices').classList.remove('active');
    $('choices').innerHTML = '';
    $('nav-area').classList.remove('active');

    const rawText = scene.text;
    const text = replaceName(rawText);

    if (scene.choices && scene.choices.length > 0) {
      typeText($('story-text'), text, 25, () => {
        showChoices(scene.choices);
      });
    } else {
      typeText($('story-text'), text, 25, () => {
        showNextNav();
      });
    }

    $('stats-bar').classList.add('active');
    updateStatsUI();
    updateInventoryUI();
    saveState();
  }

  function showChoices(choices) {
    currentChoices = choices;
    $('choices').classList.add('active');
    $('choices').innerHTML = '';
    choices.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `<span class="choice-label">선택 ${i+1}</span>${c.label}`;
      btn.addEventListener('click', () => makeChoice(c, i));
      $('choices').appendChild(btn);
    });
  }

  function makeChoice(choice, idx) {
    if (isAnimating) return;
    currentChoices = null;

    if (choice.effects) {
      if (choice.effects.hp) state.hp = Math.max(0, Math.min(100, state.hp + choice.effects.hp));
      if (choice.effects.mp) state.mp = Math.max(0, Math.min(100, state.mp + choice.effects.mp));
      if (choice.effects.bond) state.bond = Math.max(0, Math.min(100, state.bond + choice.effects.bond));
      if (choice.effects.inventory) {
        choice.effects.inventory.forEach(item => {
          if (!state.inventory.includes(item)) state.inventory.push(item);
        });
      }
      if (choice.effects.flag) state.flags[choice.effects.flag] = true;
    }

    state.choiceHistory.push({
      chapter: state.currentChapter,
      scene: state.currentScene,
      choice: idx
    });

    updateStatsUI();
    updateInventoryUI();

    if (choice.nextScene !== undefined) {
      state.currentScene = choice.nextScene;
      renderScene();
    } else if (choice.nextChapter !== undefined) {
      state.currentChapter = choice.nextChapter;
      state.currentScene = 0;
      renderScene();
    }
    saveState();
  }

  function showNextNav() {
    const ch = getCurrentChapter();
    if (state.currentScene < ch.scenes.length - 1) {
      $('nav-area').classList.add('active');
      $('progress-text').textContent = `${ch.title} · 장면 ${state.currentScene + 1} / ${ch.scenes.length}`;
      $('next-btn').textContent = '다음 장면 →';
      $('next-btn').onclick = () => {
        state.currentScene++;
        renderScene();
      };
      $('next-btn').disabled = false;
    } else if (state.currentChapter < STORY_DATA.length - 1) {
      $('nav-area').classList.add('active');
      $('progress-text').textContent = `${ch.title} 완료`;
      $('next-btn').textContent = '다음 장 →';
      $('next-btn').onclick = () => {
        state.currentChapter++;
        state.currentScene = 0;
        renderScene();
      };
      $('next-btn').disabled = false;
    } else {
      $('nav-area').classList.add('active');
      $('progress-text').textContent = '🎉 완결';
      $('next-btn').textContent = '처음으로';
      $('next-btn').onclick = () => {
        clearState();
        state.currentChapter = 0;
        state.currentScene = 0;
        state.hp = 100; state.mp = 100; state.bond = 50;
        state.inventory = ['목걸이 (어머니의 유품)'];
        state.flags = {};
        state.choiceHistory = [];
        saveState();
        $('title-screen').style.display = 'block';
        $('story-screen').classList.remove('active');
        $('continue-bar').classList.remove('active');
      };
      $('next-btn').disabled = false;
    }
  }

  function startStory() {
    $('title-screen').style.display = 'none';
    $('story-screen').classList.add('active');
    $('continue-bar').classList.remove('active');
    state.started = true;
    state.currentChapter = 0;
    state.currentScene = 0;
    renderScene();
  }

  function continueStory() {
    $('title-screen').style.display = 'none';
    $('story-screen').classList.add('active');
    $('continue-bar').classList.remove('active');
    renderScene();
  }

  $('start-btn').addEventListener('click', () => {
    clearState();
    playerName = $('name-input').value.trim() || '소라인';
    state = {
      currentChapter: 0, currentScene: 0,
      hp: 100, mp: 100, bond: 50,
      inventory: ['목걸이 (어머니의 유품)'],
      flags: {}, choiceHistory: [], started: true,
      playerName: playerName
    };
    startStory();
  });

  $('continue-btn').addEventListener('click', continueStory);

  $('name-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $('start-btn').click();
  });
  $('reset-btn').addEventListener('click', () => {
    clearState();
    playerName = $('name-input').value.trim() || '소라인';
    state = {
      currentChapter: 0, currentScene: 0,
      hp: 100, mp: 100, bond: 50,
      inventory: ['목걸이 (어머니의 유품)'],
      flags: {}, choiceHistory: [], started: true,
      playerName: playerName
    };
    startStory();
  });

  const saved = loadState();
  if (saved && saved.started) {
    playerName = saved.playerName || '소라인';
    $('continue-bar').classList.add('active');
  }

  // 도움말 동적 생성 (모바일/데스크톱 구분)
  function renderHelp() {
    const box = $('help-box-content');
    if (isMobile) {
      box.innerHTML = `
        <h2>조작 방법</h2>
        <div class="help-row mobile-only" style="display:flex">
          <span class="help-key" style="min-width:auto;padding:6px 10px">👆 화면 터치</span>
          <span class="help-desc">텍스트 전체 출력 / 다음 장면으로 이동</span>
        </div>
        <div class="help-row mobile-only" style="display:flex">
          <span class="help-key" style="min-width:auto;padding:6px 10px">선택지</span>
          <span class="help-desc">선택지 버튼을 직접 터치하여 선택합니다</span>
        </div>
        <div class="help-row mobile-only" style="display:flex">
          <span class="help-key" style="min-width:auto;padding:6px 10px">저장</span>
          <span class="help-desc">자동 저장됩니다. 언제든 이어서 읽기가 가능합니다</span>
        </div>
        <button class="help-close-btn" id="help-close-btn">확인</button>
      `;
    } else {
      box.innerHTML = `
        <h2>조작 방법</h2>
        <div class="help-row desktop-only" style="display:flex">
          <span class="help-key">Space</span>
          <span class="help-desc">텍스트 전체 출력 / 다음 장면 넘어가기</span>
        </div>
        <div class="help-row desktop-only" style="display:flex">
          <span class="help-key">1 · 2</span>
          <span class="help-desc">선택지가 나타났을 때 숫자 키로 선택</span>
        </div>
        <div class="help-row desktop-only" style="display:flex">
          <span class="help-key">Enter</span>
          <span class="help-desc">이름 입력 후 바로 시작</span>
        </div>
        <button class="help-close-btn" id="help-close-btn">확인</button>
      `;
    }
    // 재연결
    $('help-close-btn').addEventListener('click', () => toggleHelp(false));
  }

  function toggleHelp(show) {
    if (show) {
      renderHelp();
      $('help-overlay').classList.add('active');
    }
    else $('help-overlay').classList.remove('active');
  }

  $('help-btn-title').addEventListener('click', () => toggleHelp(true));
  $('help-btn').addEventListener('click', () => toggleHelp(true));
  $('help-overlay').addEventListener('click', (e) => {
    if (e.target === $('help-overlay')) toggleHelp(false);
  });

  // skip hint 텍스트 설정
  $('skip-hint').textContent = isMobile ? '화면을 터치하세요' : '[ Space ] 전체 출력';

  if (!localStorage.getItem('webnovel_help_seen')) {
    toggleHelp(true);
    localStorage.setItem('webnovel_help_seen', '1');
  }
})();
</script>
</body>
</html>
