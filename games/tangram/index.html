<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐰 칠교조각 퍼즐</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- START SCREEN -->
<div id="screen-start" class="screen active">
  <div class="screen-content">
    <div class="game-icon">🧩</div>
    <h1 class="game-title">칠교조각 퍼즐</h1>
    <p class="game-subtitle">7개의 조각으로 도형을 완성하세요!</p>
    <div class="level-preview">
      <span class="level-badge">총 10단계</span>
      <span class="level-badge">도형 → 사물 → 동물</span>
    </div>
    <button id="btn-start" class="btn btn-primary">✨ 게임 시작</button>
    <p class="hint-text">🖱️ 조각을 드래그하고 <kbd>R</kbd>키로 회전하세요</p>
  </div>
</div>

<!-- GAMEPLAY SCREEN -->
<div id="screen-play" class="screen">
  <div class="hud">
    <div class="hud-left">
      <span class="hud-item">📊 레벨 <span id="hud-level">1</span>/10</span>
      <span class="hud-item">⭐ <span id="hud-score">0</span>점</span>
    </div>
    <div class="hud-right">
      <span class="hud-item">⏱️ <span id="hud-timer">60</span>초</span>
      <span id="hud-match" class="hud-match">일치도 --%</span>
    </div>
  </div>
  <div class="canvas-wrapper">
    <canvas id="game-canvas"></canvas>
  </div>
  <button id="btn-check" class="btn btn-check">✅ 완성 확인</button>
</div>

<!-- LEVEL CLEAR SCREEN -->
<div id="screen-clear" class="screen">
  <div class="screen-content">
    <div class="result-icon">🎉</div>
    <h2 class="result-title">클리어!</h2>
    <div class="result-stats">
      <div class="stat-item">
        <span class="stat-label">일치도</span>
        <span class="stat-value" id="clear-iou">92%</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">획득 점수</span>
        <span class="stat-value" id="clear-score">+850</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">남은 시간</span>
        <span class="stat-value" id="clear-time">25초</span>
      </div>
    </div>
    <button id="btn-next" class="btn btn-primary">▶️ 다음 레벨</button>
  </div>
</div>

<!-- GAME OVER SCREEN -->
<div id="screen-gameover" class="screen">
  <div class="screen-content">
    <div class="result-icon">😢</div>
    <h2 class="result-title">시간 초과!</h2>
    <p class="gameover-level">레벨 <span id="gameover-level">1</span>에서 실패</p>
    <div class="result-stats">
      <div class="stat-item">
        <span class="stat-label">현재 점수</span>
        <span class="stat-value" id="gameover-score">0</span>
      </div>
    </div>
    <button id="btn-restart-go" class="btn btn-primary">🔄 다시 시작</button>
  </div>
</div>

<!-- ENDING SCREEN -->
<div id="screen-ending" class="screen">
  <div class="screen-content">
    <div class="result-icon">🏆</div>
    <h2 class="result-title">올 클리어!</h2>
    <p class="ending-subtitle">10단계를 모두 완성했습니다!</p>
    <div class="result-stats">
      <div class="stat-item">
        <span class="stat-label">총점</span>
        <span class="stat-value" id="ending-total">0</span>
      </div>
    </div>
    <button id="btn-play-again" class="btn btn-primary">🔄 다시 플레이</button>
  </div>
</div>

<script src="js/tangram.js"></script>
<script src="js/levels.js"></script>
<script src="js/timer.js"></script>
<script src="js/scoring.js"></script>
<script src="js/validation.js"></script>
<script src="js/renderer.js"></script>
<script src="js/interaction.js"></script>
<script src="js/screens.js"></script>
<script src="js/main.js"></script>

</body>
</html>
